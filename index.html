    <style>
        /* VARIABLES & BASE */
        :root {
            --color-primary: #111111;
            --color-secondary: #ffffff;
            --color-accent: #2563eb;
            --font-family: system-ui, Inter, sans-serif;
            --gap-md: 16px;
            --padding-lg: 24px;
            --section-gap-xl: 40px;
        }

        /* BASE STYLES */
        body {
            font-family: var(--font-family);
            color: var(--color-primary);
            background-color: var(--color-secondary);
            margin: 0;
            padding: 0;
            line-height: 1.65;
            box-sizing: border-box;
        }

        *, *::before, *::after {
            box-sizing: inherit;
        }

        /* LAYOUT */
        .container {
            max-width: 960px; /* Fixed width for strict grid adherence */
            margin: 0 auto;
            padding: 0 var(--padding-lg);
        }

        /* TYPOGRAPHY & ELEMENTS */
        h1, h2, h3, h4 {
            font-weight: 700; /* Bold default for impact */
            line-height: 1.2;
            margin-top: 0;
            margin-bottom: var(--gap-md);
        }

        h1 { font-size: 3rem; } /* Large headline */
        h2 { font-size: 2.25rem; border-bottom: 1px solid #e0e0e0; padding-bottom: 10px; margin-bottom: var(--section-gap-xl); }
        h3 { font-size: 1.5rem; }

        p, li {
            font-size: 1.1rem;
            margin-bottom: 16px; /* Consistent spacing */
        }
        
        a {
            color: var(--color-accent);
            text-decoration: none;
            transition: color 0.2s ease-in-out;
        }

        a:hover {
            color: #1e40af; /* Slightly darker accent on hover */
        }

        /* HEADER & NAV */
        header {
            border-bottom: 1px solid var(--color-primary);
            padding: 20px 0;
            position: sticky;
            top: 0;
            background-color: var(--color-secondary);
            z-index: 100;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h1 {
            margin: 0;
            font-size: 2rem;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 30px;
        }

        nav a {
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* MAIN CONTENT SECTIONS */
        main section {
            padding-bottom: var(--section-gap-xl);
            border-bottom: 1px solid #e0e0e0; /* Section Divider Rule */
        }

        /* HERO SECTION SPECIFIC */
        .hero {
            padding: 80px var(--padding-lg) 60px;
            text-align: center;
            border-bottom: 2px solid var(--color-primary); /* Stronger divider for hero */
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
        
        .hero p {
            font-size: 1.4rem;
            max-width: 780px;
            margin: 0 auto 30px;
        }

        /* CARD GRID (UGC Reviews) */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--gap-md);
            margin-top: 30px;
        }

        .review-card {
            border: 1px solid #e0e0e0;
            padding: var(--padding-lg);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .review-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 10px rgba(17, 17, 17, 0.08); /* Subtle shadow */
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .reviewer-name {
            font-weight: 700;
            font-size: 1.15rem;
        }
        
        .review-date {
            font-size: 0.9rem;
            color: #666;
        }

        /* Rating Display (Stars via SVG/CSS) */
        .rating {
            display: flex;
            gap: 2px;
            align-items: center;
        }

        .star {
            width: 18px;
            height: 18px;
            fill: #ffc700; /* Gold/Yellow color for stars */
        }
        /* Empty star fill (used by background if necessary, but here we just use solid) */

        .review-card p {
            margin: 0;
        }


        /* FOOTER */
        footer {
            background-color: var(--color-primary);
            color: #aaaaaa;
            padding: 30px 0;
            text-align: center;
            border-top: 1px solid #333333;
        }

        /* RESPONSIVENESS */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            h2 { font-size: 1.8rem; }
            
            .nav-content {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }

            /* Hamburger Menu Integration */
            .menu-toggle {
                display: block; /* Show toggle on mobile */
                cursor: pointer;
                font-size: 28px;
                color: var(--color-primary);
                line-height: 1;
            }

            nav {
                /* Hide default nav list, show hamburger icon area */
                display: none; 
                flex-direction: column;
                width: 100%; /* Take full width when active */
            }
            
            nav.active {
                 display: flex;
            }

            nav ul {
                flex-direction: column;
                gap: 15px; /* Smaller gap for vertical stacking */
                width: 100%;
            }
        }

        /* Mobile specific adjustments (to ensure hamburger works) */
        .mobile-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;

                align-items: center;

             .nav-content .logo { margin-right: auto; } /* Pushes logo left */
